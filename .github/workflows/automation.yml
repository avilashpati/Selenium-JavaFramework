name: Selenium Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Run Tests
        run: mvn test
